# docdiff configuration file
# Copy this to .docdiff.yaml and customize as needed

# The annotation tag to search for in comments (default: "@doc")
# Change this if @doc conflicts with existing annotations in your codebase
annotation_tag: "@doc"

# Directory containing documentation files (default: "docs")
docs_directory: docs

# Glob patterns for files to include (empty = all supported files)
# Examples:
# include:
#   - "src/**"
#   - "app/**"
#   - "lib/**"
include: []

# Skip files that git ignores (via `git check-ignore`). Default: true.
# Add a .docdiffignore file (one glob per line) for extra excludes that aren't
# in .gitignore, e.g. committed vendored license text or local notes.
respect_gitignore: true

# Glob patterns for files to exclude.
# A pattern with no "/" matches the basename at any depth (gitignore-like),
# so "*.lock" or "LICENSE.txt" exclude matching files anywhere.
exclude:
  - "vendor/**"
  - "node_modules/**"
  - ".git/**"
  - "dist/**"
  - "build/**"
  - "target/**"
  - "__pycache__/**"
  - ".venv/**"
  - "venv/**"

# Language-specific configuration
# You can enable/disable languages or customize their extensions
languages:
  php:
    enabled: true
  go:
    enabled: true
  java:
    enabled: true
  python:
    enabled: true
  javascript:
    enabled: true
  ruby:
    enabled: true

# CI mode settings
ci:
  # Exit with code 1 when stale docs are found
  fail_on_stale: true
  # Exit with code 1 when orphaned files are found (files without @doc)
  fail_on_orphaned: false
